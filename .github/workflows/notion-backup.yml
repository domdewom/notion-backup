name: Notion Backup

on:
  workflow_dispatch:
    inputs:
      run_api_fallback:
        description: "Run API fallback export (secondary/manual only)"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 2 * * *"
    - cron: "0 3 * * 0"

permissions:
  contents: write

concurrency:
  group: notion-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_NOTION_VERSION: "2025-09-03"
      NATIVE_EXPORT_TOKEN_V2: ${{ secrets.NATIVE_EXPORT_TOKEN_V2 }}
      NATIVE_EXPORT_FILE_TOKEN: ${{ secrets.NATIVE_EXPORT_FILE_TOKEN }}
      NOTION_SPACE_ID: ${{ secrets.NOTION_SPACE_ID }}
      OFFICIAL_EXPORT_MODE: "workspace"
      OFFICIAL_WORKSPACE_RETRYABLE_FAILURE_RETRIES: "1"
      OFFICIAL_WORKSPACE_POLL_TIMEOUT_SECONDS: "10800"
      OFFICIAL_WORKSPACE_UI_FALLBACK: "1"
      OFFICIAL_WORKSPACE_UI_TIMEOUT_SECONDS: "2400"
      QUALITY_MIN_MD_COUNT: "100"
      QUALITY_MIN_CSV_COUNT: "10"
      QUALITY_MAX_DROP_PERCENT: "60"
      OFFICIAL_ZIP_KEEP_DAYS: "30"
      PROGRESS_MODE: plain

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check setup
        id: setup
        run: |
          if [ -z "${NATIVE_EXPORT_TOKEN_V2:-}" ] || [ -z "${NOTION_SPACE_ID:-}" ]; then
            echo "::notice title=Notion backup not configured::Add the NATIVE_EXPORT_TOKEN_V2 and NOTION_SPACE_ID repository secrets in Settings > Secrets and variables > Actions, then rerun this workflow. See README.md for cookie retrieval steps."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.setup.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        if: steps.setup.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        if: steps.setup.outputs.configured == 'true'
        run: python3 -m pip install -r requirements.txt

      - name: Install Node dependencies
        if: steps.setup.outputs.configured == 'true'
        run: npm install

      - name: Install Playwright browser
        if: steps.setup.outputs.configured == 'true'
        run: npx playwright install --with-deps chromium

      - name: Restore previous backup state
        if: steps.setup.outputs.configured == 'true'
        run: |
          set -euo pipefail
          BACKUP_BRANCH="notion-backups"

          if git ls-remote --exit-code --heads origin "${BACKUP_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${BACKUP_BRANCH}"
            if git cat-file -e FETCH_HEAD:backups 2>/dev/null; then
              git restore --source=FETCH_HEAD --worktree -- backups
            else
              echo "${BACKUP_BRANCH} exists but has no backups directory; starting from scratch"
            fi
          else
            echo "No existing ${BACKUP_BRANCH} branch; starting from scratch"
          fi

      - name: Export via official Notion ZIP flow
        if: steps.setup.outputs.configured == 'true'
        run: node scripts/export_official_zip.mjs

      - name: API fallback export (manual only)
        if: ${{ steps.setup.outputs.configured == 'true' && github.event_name == 'workflow_dispatch' && inputs.run_api_fallback == true }}
        run: python3 scripts/export_official.py

      - name: Render HTML
        if: steps.setup.outputs.configured == 'true'
        run: python3 scripts/render_html.py

      - name: Publish backups to backup branch
        if: steps.setup.outputs.configured == 'true'
        run: |
          set -euo pipefail
          BACKUP_BRANCH="notion-backups"
          PUBLISH_DIR="$(mktemp -d)"

          cp -a backups "${PUBLISH_DIR}/backups"

          git config user.name "notion-backup-bot"
          git config user.email "notion-backup-bot@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "${BACKUP_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${BACKUP_BRANCH}"
            git switch --detach FETCH_HEAD
            git switch -C "${BACKUP_BRANCH}"
          else
            git switch --orphan "${BACKUP_BRANCH}"
          fi

          git rm -r --ignore-unmatch -q .
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "${PUBLISH_DIR}/backups" ./backups

          git add -A backups

          if git diff --cached --quiet; then
            echo "No backup changes to commit"
            exit 0
          fi

          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          git commit -m "backup: notion snapshot ${TS}"
          git push origin "${BACKUP_BRANCH}"

      - name: Upload run reports
        if: ${{ always() && steps.setup.outputs.configured == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: notion-backup-run-reports
          path: |
            backups/manifests/failures.json
            backups/manifests/run_summary.json
            backups/manifests/coverage_report.json
            backups/manifests/roots.json
            backups/manifests/workspace_export.json
          if-no-files-found: ignore
